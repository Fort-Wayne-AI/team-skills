name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install disposable SOPS integration-test prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends age
          version=3.13.3
          asset="sops-v${version}.linux.amd64"
          expected="e5bec3346a873ae91d871550f3e698c1aad962aff462a080e40f25fde17fef6b"
          curl --fail --silent --show-error --location "https://github.com/getsops/sops/releases/download/v${version}/${asset}" --output /tmp/sops
          printf '%s  %s\n' "$expected" /tmp/sops | sha256sum --check --status
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          sops --version --check-for-updates
          age-keygen --version

      - name: Run tests
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run
